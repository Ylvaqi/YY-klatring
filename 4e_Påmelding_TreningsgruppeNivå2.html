                    <input type="hidden" name="Kurs" value="Treningsgruppe Nivå 2 (Viderekommen)">

                               class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition font-medium">
                    </div>

                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3 ml-1">E-post</label>

                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3 ml-1">Telefon</label>

                                   class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition font-medium">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3 ml-1">Erfaring og mål</label>
                        <textarea name="Erfaring" rows="4" placeholder="Fortell litt om hva du klatrer i dag og hva du ønsker å bli bedre på..." 
                                  class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition font-medium resize-none"></textarea>
                    </div>

                    <div class="pt-4">

                    <p class="text-[10px] text-slate-400 text-center uppercase tracking-tight mt-4">
